# Deploy backend on Render (recommended — not Vercel).
# Dashboard: New → Blueprint → connect EhsanPortfolio-Back-End repo.
services:
  - type: web
    name: ehsan-portfolio-api
    runtime: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm rebuild bcrypt && pnpm build
    startCommand: node build/src/main
    healthCheckPath: /v1/catalog/site-settings
    envVars:
      - key: NODE_ENV
        value: production
      - key: PNPM_VERSION
        value: "11.6.0"
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: ALLOW_VERCEL_PREVIEW
        value: "true"
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
